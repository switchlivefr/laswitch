<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ajouter Nom">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>Ajouter un nom</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;
  --card:#13131f;
  --border:#1e1e30;
  --gold:#f2c94c;
  --gglo:rgba(242,201,76,.25);
  --cyan:#34d1c0;
  --white:#ece9e0;
  --muted:#5a5a78;
  --green:#4caf7d;
  --r:14px;
}
html,body{height:100%;overscroll-behavior:none}
body{
  background:var(--bg);
  color:var(--white);
  font-family:'DM Sans',sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:24px 20px;
  padding-top:max(24px,env(safe-area-inset-top));
  padding-bottom:max(24px,env(safe-area-inset-bottom));
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(242,201,76,.08) 0%,transparent 70%);
  pointer-events:none;
}
.wrap{position:relative;z-index:1;width:100%;max-width:460px;display:flex;flex-direction:column;align-items:center;gap:0}

/* Titre */
.title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(42px,12vw,64px);
  letter-spacing:4px;
  color:var(--gold);
  text-shadow:0 0 40px var(--gglo);
  text-align:center;
  margin-bottom:6px;
}
.subtitle{
  font-family:'DM Sans',sans-serif;
  font-size:13px;
  color:var(--white);
  letter-spacing:2px;
  text-transform:uppercase;
  text-align:center;
  margin-bottom:36px;
}

/* Champ */
.field{
  width:100%;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:16px 20px;
  font-family:'DM Sans',sans-serif;
  font-size:18px;
  font-weight:600;
  color:var(--white);
  outline:none;
  -webkit-appearance:none;
  transition:border-color .2s, box-shadow .2s;
  caret-color:var(--gold);
  margin-bottom:14px;
}
.field:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(242,201,76,.12);
}
.field::placeholder{color:var(--muted);font-weight:400}

/* Champ prénom — même taille que le champ nom AVANT agrandissement */
.field-prenom{
  width:100%;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:16px 20px;
  font-family:'DM Sans',sans-serif;
  font-size:18px;
  font-weight:600;
  color:var(--white);
  outline:none;
  -webkit-appearance:none;
  transition:border-color .2s, box-shadow .2s;
  caret-color:var(--gold);
  margin-bottom:14px;
  max-width:380px; /* taille originale avant agrandissement du champ nom */
  display:block;
  margin-left:auto;
  margin-right:auto;
}
.field-prenom:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(242,201,76,.12);
}
.field-prenom::placeholder{color:var(--muted);font-weight:400}

/* Info doublon prénom */
.doublon-prenom-info{
  display:none;
  width:100%;
  max-width:380px;
  margin-bottom:14px;
  text-align:left;
  margin-left:auto;
  margin-right:auto;
}
.doublon-prenom-info.visible{display:block}
.doublon-prenom-label{
  font-size:14px;
  font-weight:600;
  color:var(--white);
  margin-bottom:4px;
}
.doublon-prenom-valeur{
  font-size:15px;
  font-weight:700;
  color:var(--green);
}

/* Aperçu du nom saisi */
.preview{
  width:100%;
  min-height:28px;
  text-align:center;
  font-size:15px;
  font-weight:600;
  color:var(--cyan);
  letter-spacing:.5px;
  margin-bottom:20px;
  opacity:0;
  transition:opacity .2s;
}
.preview.visible{opacity:1}

/* Bouton */
.btn{
  width:100%;
  background:var(--gold);
  color:#000;
  border:none;
  border-radius:var(--r);
  padding:18px;
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;
  letter-spacing:3px;
  cursor:pointer;
  transition:opacity .15s, transform .1s;
  -webkit-appearance:none;
}
.btn:disabled{opacity:.35;cursor:default}
.btn:not(:disabled):active{transform:scale(0.98);opacity:.9}

/* État résultat */
.result{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:14px;
  text-align:center;
  padding:10px 0;
}
.result.visible{display:flex}
.result-icon{font-size:52px;line-height:1}
.result-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;
  letter-spacing:2px;
}
.result-name{
  font-size:17px;
  font-weight:700;
}
.result-name.gold{color:var(--gold)}
.result-name.green{color:var(--green)}
.result-msg{font-size:14px;color:var(--white);line-height:1.5}
.btn-again{
  margin-top:8px;
  background:none;
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:14px 28px;
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  font-weight:700;
  color:var(--white);
  cursor:pointer;
  -webkit-appearance:none;
}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{
  display:none;
  width:24px;height:24px;
  border:3px solid rgba(0,0,0,.2);
  border-top-color:#000;
  border-radius:50%;
  animation:spin .7s linear infinite;
  margin:0 auto;
}
.btn.loading .btn-label{display:none}
.btn.loading .spinner{display:block}
</style>
</head>
<body>
<div class="wrap">

  <!-- FORMULAIRE -->
  <div id="form-view">
    <div class="title">SWiTCH</div>
    <div class="subtitle">Ajouter un nom Facebook</div>

    <input
      class="field"
      id="nom-input"
      type="text"
      placeholder="Nom exact Facebook…"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
      oninput="onNomInput(this.value)"
      onfocus="onNomFocus()"
    >

    <input
      class="field-prenom"
      id="prenom-input"
      type="text"
      placeholder="Prénom"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
      oninput="onPrenomInput(this.value)"
    >

    <!-- Info doublon prénom -->
    <div class="doublon-prenom-info" id="doublon-prenom-info">
      <div class="doublon-prenom-label">Prénom actuel</div>
      <div class="doublon-prenom-valeur" id="doublon-prenom-valeur"></div>
    </div>

    <div class="preview" id="preview"></div>

    <button class="btn" id="submit-btn" disabled onclick="submit()">
      <span class="btn-label" id="btn-label">AJOUTER</span>
      <div class="spinner"></div>
    </button>
  </div>

  <!-- RÉSULTAT -->
  <div class="result" id="result-view">
    <div class="result-icon" id="result-icon">✅</div>
    <div class="result-title" id="result-title">AJOUTÉ !</div>
    <div class="result-name" id="result-name"></div>
    <div class="result-msg" id="result-msg"></div>
    <button class="btn-again" onclick="reset()">Ajouter un autre nom</button>
  </div>

</div>

<script>
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz-6BtAXoKEx2oWbfFt8u3N6XuKMjfZ7f7ReGDn7wbkbz9JlJnRv0fR5Zqm8JWyDpM1/exec';

// État global
var state = {
  nomDoublon: false,
  prenomExistant: null,  // prénom déjà en col G pour ce nom
  modeRemplacement: false
};

function onNomFocus() {
  // Si on retouche le champ nom en mode doublon-prénom-différent → réinitialiser tout
  if (state.nomDoublon) {
    resetFields();
  }
}

function onNomInput(val) {
  // Réinitialiser l'état doublon à chaque frappe sur le nom
  state.nomDoublon = false;
  state.prenomExistant = null;
  state.modeRemplacement = false;
  hidePrenomDoublon();
  document.getElementById('btn-label').textContent = 'AJOUTER';

  var preview = document.getElementById('preview');
  var btn = document.getElementById('submit-btn');
  var trimmed = val.trim();
  if (trimmed) {
    preview.textContent = '→ "' + trimmed + '"';
    preview.classList.add('visible');
    btn.disabled = false;
  } else {
    preview.textContent = '';
    preview.classList.remove('visible');
    btn.disabled = true;
  }
}

function onPrenomInput(val) {
  // Si on est en mode doublon et que le prénom change, vérifier si on est en mode remplacement
  if (state.prenomExistant !== null) {
    var trimmed = val.trim();
    if (trimmed && trimmed.toLowerCase() !== state.prenomExistant.toLowerCase()) {
      // Prénom différent → mode REMPLACER
      state.modeRemplacement = true;
      document.getElementById('btn-label').textContent = 'REMPLACER';
      document.getElementById('submit-btn').disabled = false;
    } else {
      state.modeRemplacement = false;
      document.getElementById('btn-label').textContent = 'AJOUTER';
    }
  }
}

function hidePrenomDoublon() {
  var info = document.getElementById('doublon-prenom-info');
  info.classList.remove('visible');
  document.getElementById('doublon-prenom-valeur').textContent = '';
}

function showPrenomDoublon(prenomExistant) {
  var info = document.getElementById('doublon-prenom-info');
  document.getElementById('doublon-prenom-valeur').textContent = prenomExistant;
  info.classList.add('visible');
}

function submit() {
  var nomInput = document.getElementById('nom-input');
  var prenomInput = document.getElementById('prenom-input');
  var nom = nomInput.value.trim();
  var prenom = prenomInput.value.trim();
  if (!nom) return;

  var btn = document.getElementById('submit-btn');
  btn.classList.add('loading');
  btn.disabled = true;

  var action = state.modeRemplacement ? 'replacePrenom' : 'addAppliName';
  var url = APPS_SCRIPT_URL + '?action=' + action
    + '&name=' + encodeURIComponent(nom)
    + '&prenom=' + encodeURIComponent(prenom);

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      btn.classList.remove('loading');

      if (action === 'replacePrenom') {
        // Remplacement du prénom réussi
        if (data.ok) {
          showResult('prenom', prenom, '');
        } else {
          showResult('erreur', nom, data.error || 'Erreur inconnue.');
        }
        return;
      }

      // Action addAppliName
      if (data.ok) {
        showResult('ajoute', nom, data.ligne ? 'Ligne ' + data.ligne + ' de IDS_APPLI' : '');
      } else if (data.duplicate) {
        // Doublon de nom
        var prenomExistant = data.prenomExistant || '';
        var prenomSaisi = prenom;

        if (prenomExistant && prenomSaisi && prenomSaisi.toLowerCase() !== prenomExistant.toLowerCase()) {
          // Doublon nom, prénom différent → mode remplacement
          state.nomDoublon = true;
          state.prenomExistant = prenomExistant;
          state.modeRemplacement = true;
          showPrenomDoublon(prenomExistant);
          document.getElementById('btn-label').textContent = 'REMPLACER';
          btn.disabled = false;
        } else {
          // Doublon nom ET prénom identique (ou pas de prénom) → ABANDON
          showResult('abandon', nom, 'Ce nom existe déjà dans la liste.');
        }
      } else {
        showResult('erreur', nom, data.error || 'Erreur inconnue.');
      }
    })
    .catch(function(e) {
      btn.classList.remove('loading');
      showResult('erreur', nom, 'Erreur réseau. Vérifie ta connexion.');
    });
}

function showResult(type, valeur, msg) {
  document.getElementById('form-view').style.display = 'none';
  var rv = document.getElementById('result-view');
  rv.classList.add('visible');

  var icon = document.getElementById('result-icon');
  var title = document.getElementById('result-title');
  var name = document.getElementById('result-name');
  var msgEl = document.getElementById('result-msg');

  msgEl.textContent = msg || '';

  if (type === 'ajoute') {
    icon.textContent = '✅';
    title.textContent = 'AJOUTÉ !';
    title.style.color = 'var(--gold)';
    name.textContent = '"' + valeur + '"';
    name.className = 'result-name gold';
  } else if (type === 'prenom') {
    icon.textContent = '✅';
    title.textContent = 'REMPLACÉ !';
    title.style.color = 'var(--gold)';
    name.textContent = valeur;
    name.className = 'result-name green';
  } else if (type === 'abandon') {
    icon.textContent = '';
    title.textContent = 'ABANDON';
    title.style.color = '#e8407a';
    name.textContent = '"' + valeur + '"';
    name.className = 'result-name gold';
  } else {
    icon.textContent = '';
    title.textContent = 'ERREUR';
    title.style.color = '#e8407a';
    name.textContent = '"' + valeur + '"';
    name.className = 'result-name gold';
  }
}

function resetFields() {
  state.nomDoublon = false;
  state.prenomExistant = null;
  state.modeRemplacement = false;
  hidePrenomDoublon();
  document.getElementById('nom-input').value = '';
  document.getElementById('prenom-input').value = '';
  document.getElementById('preview').classList.remove('visible');
  document.getElementById('preview').textContent = '';
  document.getElementById('btn-label').textContent = 'AJOUTER';
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('submit-btn').classList.remove('loading');
}

function reset() {
  document.getElementById('form-view').style.display = '';
  var rv = document.getElementById('result-view');
  rv.classList.remove('visible');
  resetFields();
  setTimeout(function(){ document.getElementById('nom-input').focus(); }, 100);
}

// Focus auto au chargement
window.addEventListener('load', function() {
  setTimeout(function(){ document.getElementById('nom-input').focus(); }, 300);
});

// Entrée clavier = soumettre
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    var btn = document.getElementById('submit-btn');
    if (!btn.disabled) submit();
  }
});
</script>
</body>
</html>
